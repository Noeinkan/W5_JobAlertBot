# jobs.noeinsolutions.com — Job Alert Bot Dashboard
# Proxies to the PM2-managed dashboard running on the host (port 3099) via
# host.docker.internal, with the dashboard token injected so the global
# token guard sees a valid header.

# HTTP — ACME challenge + redirect everything else to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jobs.noeinsolutions.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — dashboard
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jobs.noeinsolutions.com;

    ssl_certificate     /etc/letsencrypt/live/jobs.noeinsolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobs.noeinsolutions.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass         http://host.docker.internal:3099;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Dashboard-Token "3a8c49fd101a469b794a762617af87db616899201eded6841a36bb87cef0dda8";

        # SSE for live log streaming
        proxy_set_header   Connection '';
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering    off;
        proxy_read_timeout 24h;
    }
}
