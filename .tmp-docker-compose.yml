version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      ML_SERVICE_URL: http://ml-service:8000
    volumes:
      - sqlite-data:/app/server/db
      - uploads-data:/app/server/uploads
    depends_on:
      ml-service:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      DEPLOYMENT_ENV: production
      # Docker-internal: override OLLAMA_BASE_URL to use the Docker service name
      OLLAMA_BASE_URL: http://ollama:11434
      # All other vars (OLLAMA_MODEL, GEMINI_API_KEY, KICKSTART_*, etc.)
      # come from .env.production via env_file above — do NOT re-declare them
      # here with ${VAR:-default} interpolation, as that reads from the host
      # shell / .env file and silently overrides the env_file values.
    depends_on:
      - ollama-init
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KEEP_ALIVE=5m
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - internal
    env_file:
      - .env.production
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "sleep 5 &&
      ollama pull $${OLLAMA_MODEL:-qwen3:8b} &&
      ollama pull $${OLLAMA_FAST_MODEL:-qwen3.5:2b} &&
      if [ -n \"$$OLLAMA_QUESTIONS_MODEL\" ] && [ \"$$OLLAMA_QUESTIONS_MODEL\" != \"$$OLLAMA_MODEL\" ] && [ \"$$OLLAMA_QUESTIONS_MODEL\" != \"$$OLLAMA_FAST_MODEL\" ];
      then ollama pull $$OLLAMA_QUESTIONS_MODEL; fi"
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf.d/noeinsol.conf:/etc/nginx/conf.d/noeinsol.conf:ro
      - ./nginx/conf.d/jobs.conf:/etc/nginx/conf.d/jobs.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  sqlite-data:
  uploads-data:
  ollama-data:

networks:
  internal:
    driver: bridge
