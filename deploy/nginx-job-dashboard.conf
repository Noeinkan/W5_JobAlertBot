# Job Alert Bot — dashboard reverse proxy
# Upload this file to /etc/nginx/snippets/job-dashboard.conf on the server,
# then include it inside your nginx server {} block BEFORE any catch-all rules:
#
#   include /etc/nginx/snippets/job-dashboard.conf;
#
# After adding the include, run: nginx -t && systemctl reload nginx
# Or use: bash deploy.sh --nginx  (handles upload + reload automatically)

location /job_dashboard {
    proxy_pass         http://127.0.0.1:3099;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        '';
    proxy_buffering    off;   # SSE: flush events to browser immediately
    proxy_cache        off;
    proxy_read_timeout 86400s;
}
